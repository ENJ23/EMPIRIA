<header class="header">
    <div class="container header-content">
        <a routerLink="/" class="logo" (click)="closeMobileMenu()">
            <span class="logo-text">EMPIRIA</span>
        </a>

        <!-- Hamburger Menu Button (Mobile Only) -->
        <button class="hamburger" [class.active]="mobileMenuOpen" (click)="toggleMobileMenu()" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Mobile Menu Overlay -->
        <div class="mobile-overlay" [class.active]="mobileMenuOpen" (click)="closeMobileMenu()"></div>

        <!-- Navigation Menu -->
        <nav class="nav-menu" [class.mobile-open]="mobileMenuOpen">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link"
                (click)="closeMobileMenu()">Inicio</a>
            <a routerLink="/events" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">Eventos</a>
            <a routerLink="/calendar" routerLinkActive="active" class="nav-link"
                (click)="closeMobileMenu()">Calendario</a>
            <a routerLink="/promociones" routerLinkActive="active" class="nav-link"
                (click)="closeMobileMenu()">Promociones</a>
            <a routerLink="/contacto" routerLinkActive="active" class="nav-link"
                (click)="closeMobileMenu()">Contacto</a>

            <!-- Mobile User Actions (inside menu) -->
            <div class="mobile-user-section">
                <ng-container *ngIf="authService.currentUser() as user">
                    <div class="mobile-user-info">
                        <span class="mobile-user-name">{{ user.nombre }}</span>
                        <a routerLink="/mis-entradas" routerLinkActive="active" class="mobile-nav-link"
                            (click)="closeMobileMenu()">
                            <span class="material-icons">confirmation_number</span>
                            <span>Mis entradas</span>
                        </a>
                        <a routerLink="/mis-pagos" routerLinkActive="active" class="mobile-nav-link"
                            (click)="closeMobileMenu()">
                            <span class="material-icons">receipt_long</span>
                            <span>Mis pagos</span>
                        </a>
                        <a *ngIf="user.tipo === 'Admin'" routerLink="/admin" class="mobile-nav-link"
                            (click)="closeMobileMenu()">
                            <span class="material-icons">dashboard</span>
                            <span>Dashboard</span>
                        </a>
                        <button (click)="logout()" class="mobile-logout-btn">
                            <span class="material-icons">logout</span>
                            <span>Cerrar Sesión</span>
                        </button>
                    </div>
                </ng-container>
                <ng-container *ngIf="!authService.currentUser()">
                    <a routerLink="/admin/login" class="mobile-login-btn" (click)="closeMobileMenu()">Ingresar</a>
                </ng-container>
            </div>
        </nav>

        <!-- Desktop User Actions -->
        <div class="user-actions desktop-only">
            <ng-container *ngIf="authService.currentUser() as user; else loginButton">
                <div class="user-info">
                    <span class="user-name">Hola, {{ user.nombre }}</span>
                    <div class="user-links" *ngIf="user">
                        <a routerLink="/mis-entradas" routerLinkActive="active" class="user-link" title="Mis Entradas">
                            <span class="material-icons">confirmation_number</span>
                            <span class="user-link-text">Mis entradas</span>
                        </a>
                        <a routerLink="/mis-pagos" routerLinkActive="active" class="user-link" title="Mis Pagos">
                            <span class="material-icons">receipt_long</span>
                            <span class="user-link-text">Mis pagos</span>
                        </a>
                    </div>
                    <button (click)="logout()" class="btn-logout" title="Cerrar Sesión">
                        <span class="material-icons">logout</span>
                    </button>
                    <a *ngIf="user.tipo === 'Admin'" routerLink="/admin" class="btn-dashboard" title="Dashboard">
                        <span class="material-icons">dashboard</span>
                    </a>
                </div>
            </ng-container>

            <ng-template #loginButton>
                <a routerLink="/admin/login" class="btn btn-sm">Ingresar</a>
            </ng-template>
        </div>
    </div>
</header>
